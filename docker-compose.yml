version: '3'
services:
  app:
    image: myapp:latest
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - ENV_VAR=value
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: